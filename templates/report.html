<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NetScanX — Network Security Scanner</title>
  <style>
    :root {
      --bg:       #0d1117;
      --surface:  #161b22;
      --border:   #30363d;
      --accent:   #58a6ff;
      --green:    #3fb950;
      --yellow:   #d29922;
      --red:      #f85149;
      --orange:   #f0883e;
      --muted:    #8b949e;
      --text:     #c9d1d9;
      --textbold: #e6edf3;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; }

    /* ── Top bar ──────────────────────────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 28px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header svg { color: var(--accent); }
    header h1 { font-size: 18px; color: var(--textbold); font-weight: 600; }
    header .version { background: #21262d; border: 1px solid var(--border);
                      border-radius: 20px; padding: 2px 10px; font-size: 11px; color: var(--muted); }
    header .spacer { flex: 1; }
    #statusBadge {
      padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
      background: #21262d; border: 1px solid var(--border); color: var(--muted);
    }
    #statusBadge.scanning { background: #1c2d40; border-color: var(--accent); color: var(--accent); }
    #statusBadge.done     { background: #1b2a1e; border-color: var(--green);  color: var(--green); }
    #statusBadge.error    { background: #2a1b1b; border-color: var(--red);    color: var(--red); }

    /* ── Layout ───────────────────────────────────────────────────────── */
    .container { max-width: 1400px; margin: 0 auto; padding: 24px 28px; }

    /* ── Control bar ──────────────────────────────────────────────────── */
    .controls {
      display: flex; gap: 10px; flex-wrap: wrap;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 16px; margin-bottom: 24px;
    }
    .btn {
      padding: 8px 18px; border-radius: 7px; border: 1px solid transparent;
      font-size: 13px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; gap: 7px; transition: all .15s;
    }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn-primary  { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-primary:not(:disabled):hover { background: #79b8ff; }
    .btn-success  { background: var(--green);  color: #0d1117; border-color: var(--green); }
    .btn-success:not(:disabled):hover { background: #56d364; }
    .btn-warning  { background: var(--yellow); color: #0d1117; border-color: var(--yellow); }
    .btn-warning:not(:disabled):hover { background: #e3b341; }
    .btn-danger   { background: var(--red);    color: #fff; border-color: var(--red); }
    .btn-danger:not(:disabled):hover  { background: #ff7b72; }
    .btn-ghost    { background: transparent; color: var(--muted); border-color: var(--border); }
    .btn-ghost:not(:disabled):hover   { border-color: var(--accent); color: var(--accent); }

    /* ── Stats row ────────────────────────────────────────────────────── */
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 18px;
    }
    .stat-card .label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .stat-card .value { font-size: 28px; font-weight: 700; color: var(--textbold); }
    .stat-card.accent .value { color: var(--accent); }
    .stat-card.green  .value { color: var(--green); }
    .stat-card.yellow .value { color: var(--yellow); }
    .stat-card.red    .value { color: var(--red); }

    /* ── Section ──────────────────────────────────────────────────────── */
    .section { margin-bottom: 28px; }
    .section-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 14px;
    }
    .section-header h2 { font-size: 15px; color: var(--textbold); font-weight: 600; }
    .badge {
      background: #21262d; border: 1px solid var(--border);
      border-radius: 20px; padding: 1px 9px; font-size: 11px; color: var(--muted);
    }

    /* ── Table ────────────────────────────────────────────────────────── */
    .table-wrap {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    thead { background: #21262d; }
    th { padding: 10px 14px; text-align: left; font-size: 11px;
         text-transform: uppercase; letter-spacing: .5px; color: var(--muted);
         border-bottom: 1px solid var(--border); }
    td { padding: 10px 14px; border-bottom: 1px solid #21262d; vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #1c2128; }

    /* ── Severity chips ───────────────────────────────────────────────── */
    .sev {
      display: inline-block; padding: 2px 8px; border-radius: 4px;
      font-size: 11px; font-weight: 700; letter-spacing: .4px;
    }
    .sev-CRITICAL { background:#7f1d1d; color:#fca5a5; }
    .sev-HIGH     { background:#991b1b; color:#fca5a5; }
    .sev-MEDIUM   { background:#78350f; color:#fcd34d; }
    .sev-LOW      { background:#713f12; color:#fde68a; }
    .sev-NONE     { background:#14532d; color:#86efac; }
    .sev-UNKNOWN  { background:#374151; color:#9ca3af; }

    /* ── CVE accordion ────────────────────────────────────────────────── */
    .cve-list { display: none; padding: 10px 14px; }
    .cve-list.open { display: block; }
    .cve-item {
      background: #0d1117; border: 1px solid var(--border);
      border-radius: 8px; padding: 12px; margin-bottom: 8px;
    }
    .cve-item h4 { color: var(--accent); font-size: 13px; margin-bottom: 4px; }
    .cve-item p  { color: var(--muted);  font-size: 12px; line-height: 1.5; }
    .cve-item a  { color: var(--accent); font-size: 12px; }

    .expand-btn { cursor: pointer; background: none; border: none;
                  color: var(--accent); font-size: 12px; padding: 0; }

    /* ── Spinner ──────────────────────────────────────────────────────── */
    .spinner {
      display: none; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      width: 18px; height: 18px; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Toast ────────────────────────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 18px; font-size: 13px;
      max-width: 360px; display: none; z-index: 999; color: var(--text);
      box-shadow: 0 8px 24px rgba(0,0,0,.5);
    }
    #toast.show { display: block; animation: fadeIn .2s ease; }
    #toast.err  { border-color: var(--red); }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

    /* ── Empty state ──────────────────────────────────────────────────── */
    .empty {
      text-align: center; padding: 48px 0;
      color: var(--muted); font-size: 13px;
    }
    .empty .icon { font-size: 40px; margin-bottom: 10px; }

    /* ── Responsive ───────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      .controls { flex-direction: column; }
      header h1 { font-size: 15px; }
    }
  </style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────────── -->
<header>
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
       stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/>
    <path d="M2 12h2M20 12h2M12 2v2M12 20v2"/>
  </svg>
  <h1>NetScanX</h1>
  <span class="version">v2.0</span>
  <div class="spacer"></div>
  <div class="spinner" id="spinner"></div>
  <span id="statusBadge">Idle</span>
</header>

<div class="container">

  <!-- ── Controls ─────────────────────────────────────────────────────── -->
  <div class="controls">
    <button class="btn btn-primary"  onclick="runScan('quick')"  id="btnQuick">
      🔍 Quick Scan
    </button>
    <button class="btn btn-success"  onclick="runScan('port')"   id="btnPort" disabled>
      🔌 Port Scan
    </button>
    <button class="btn btn-warning"  onclick="runScan('cve')"    id="btnCve"  disabled>
      🛡 CVE Scan
    </button>
    <button class="btn btn-danger"   onclick="runScan('full')"   id="btnFull">
      ⚡ Full Scan
    </button>
    <div style="flex:1"></div>
    <button class="btn btn-ghost"    onclick="exportResults()"   id="btnExport">
      ⬇ Export JSON
    </button>
    <button class="btn btn-ghost"    onclick="clearResults()">
      🗑 Clear
    </button>
  </div>

  <!-- ── Stats ────────────────────────────────────────────────────────── -->
  <div class="stats">
    <div class="stat-card accent">
      <div class="label">Devices Found</div>
      <div class="value" id="statDevices">—</div>
    </div>
    <div class="stat-card green">
      <div class="label">Open Ports</div>
      <div class="value" id="statPorts">—</div>
    </div>
    <div class="stat-card red">
      <div class="label">Vulnerable Services</div>
      <div class="value" id="statVulns">—</div>
    </div>
    <div class="stat-card yellow">
      <div class="label">Critical CVEs</div>
      <div class="value" id="statCritical">—</div>
    </div>
  </div>

  <!-- ── Devices ──────────────────────────────────────────────────────── -->
  <div class="section">
    <div class="section-header">
      <h2>🖥 Discovered Devices</h2>
      <span class="badge" id="devBadge">0</span>
      <span style="color:var(--muted); font-size:12px;" id="scanTs"></span>
    </div>
    <div class="table-wrap" id="devTable">
      <div class="empty"><div class="icon">📡</div>Run Quick Scan or Full Scan to discover devices</div>
    </div>
  </div>

  <!-- ── Open Ports ───────────────────────────────────────────────────── -->
  <div class="section">
    <div class="section-header">
      <h2>🔌 Open Ports</h2>
      <span class="badge" id="portBadge">0</span>
    </div>
    <div class="table-wrap" id="portTable">
      <div class="empty"><div class="icon">🔒</div>Run Port Scan to see open services</div>
    </div>
  </div>

  <!-- ── Vulnerabilities ──────────────────────────────────────────────── -->
  <div class="section">
    <div class="section-header">
      <h2>🛡 Vulnerabilities</h2>
      <span class="badge" id="vulnBadge">0</span>
    </div>
    <div class="table-wrap" id="vulnTable">
      <div class="empty"><div class="icon">✅</div>Run CVE Scan to check for known vulnerabilities</div>
    </div>
  </div>

</div><!-- /container -->

<!-- ── Toast ──────────────────────────────────────────────────────────── -->
<div id="toast"></div>

<script>
const API = {
  quick: '/api/quick-scan',
  port:  '/api/port-scan',
  cve:   '/api/cve-scan',
  full:  '/api/full-scan',
};

let _scanning = false;

// ── UI helpers ─────────────────────────────────────────────────────────────
function setStatus(s) {
  const el = document.getElementById('statusBadge');
  const sp = document.getElementById('spinner');
  const labels = { idle:'Idle', scanning:'Scanning…', done:'Done', error:'Error' };
  el.textContent = labels[s] || s;
  el.className   = s;
  sp.style.display = s === 'scanning' ? 'block' : 'none';
}

function toast(msg, isErr=false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className   = 'show' + (isErr ? ' err' : '');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className='', 3500);
}

function setBtns(disabled) {
  ['btnQuick','btnPort','btnCve','btnFull','btnExport'].forEach(id => {
    document.getElementById(id).disabled = disabled;
  });
}

// ── Render helpers ─────────────────────────────────────────────────────────
function renderDevices(devices) {
  document.getElementById('devBadge').textContent = devices.length;
  document.getElementById('statDevices').textContent = devices.length;
  const el = document.getElementById('devTable');
  if (!devices.length) { el.innerHTML='<div class="empty"><div class="icon">📡</div>No devices found</div>'; return; }
  el.innerHTML = `
    <table>
      <thead><tr>
        <th>IP Address</th><th>Hostname</th><th>MAC Address</th>
        <th>Vendor</th><th>Device Type</th><th>Status</th>
      </tr></thead>
      <tbody>
        ${devices.map(d => `
          <tr>
            <td><strong style="color:var(--accent)">${d.ip}</strong>${d.is_gateway?' <span class="sev sev-NONE">GW</span>':''}</td>
            <td style="color:var(--muted)">${d.hostname||'—'}</td>
            <td style="font-family:monospace;font-size:12px">${d.mac||'—'}</td>
            <td>${d.vendor||'—'}</td>
            <td>${d.device_type||'—'}</td>
            <td><span class="sev sev-NONE">${d.status||'Online'}</span></td>
          </tr>`).join('')}
      </tbody>
    </table>`;
  document.getElementById('btnPort').disabled = false;
  document.getElementById('btnFull').disabled = false;
}

function renderPorts(port_scans) {
  let totalPorts = 0;
  const rows = [];
  port_scans.forEach(host => {
    (host.open_ports||[]).forEach(p => {
      totalPorts++;
      rows.push(`<tr>
        <td><strong style="color:var(--accent)">${host.ip}</strong></td>
        <td style="font-family:monospace">${p.port}/${p.protocol}</td>
        <td>${p.service||'—'}</td>
        <td>${p.product||'—'}</td>
        <td style="color:var(--muted)">${p.version||'—'}</td>
        <td style="color:var(--muted);font-size:11px;max-width:200px;white-space:normal">${p.cpe||'—'}</td>
      </tr>`);
    });
  });

  document.getElementById('portBadge').textContent = totalPorts;
  document.getElementById('statPorts').textContent  = totalPorts;
  const el = document.getElementById('portTable');
  if (!rows.length) { el.innerHTML='<div class="empty"><div class="icon">🔒</div>No open ports found</div>'; return; }
  el.innerHTML = `
    <table>
      <thead><tr>
        <th>IP</th><th>Port / Proto</th><th>Service</th><th>Product</th><th>Version</th><th>CPE</th>
      </tr></thead>
      <tbody>${rows.join('')}</tbody>
    </table>`;
  document.getElementById('btnCve').disabled = false;
}

let _cveOpen = {};
function renderVulns(vulns) {
  let critCount = 0;
  document.getElementById('vulnBadge').textContent = vulns.length;
  document.getElementById('statVulns').textContent  = vulns.length;
  const el = document.getElementById('vulnTable');
  if (!vulns.length) {
    el.innerHTML='<div class="empty"><div class="icon">✅</div>No vulnerabilities found</div>';
    document.getElementById('statCritical').textContent = 0;
    return;
  }

  const rows = vulns.map((v, idx) => {
    const cveHtml = (v.vulnerabilities||[]).map(c => {
      if (c.severity === 'CRITICAL') critCount++;
      return `<div class="cve-item">
        <h4>${c.cve_id} &nbsp;<span class="sev sev-${c.severity}">${c.severity} ${c.cvss_score}</span></h4>
        <p>${c.description.substring(0,300)}${c.description.length>300?'…':''}</p>
        <p style="margin-top:6px"><a href="${c.nvd_url}" target="_blank">🔗 NVD Details</a>
           &nbsp;|&nbsp; Published: ${c.published}</p>
      </div>`;
    }).join('');

    return `
      <tr>
        <td><strong style="color:var(--accent)">${v.ip}</strong><br>
            <span style="color:var(--muted);font-size:11px">${v.hostname||''}</span></td>
        <td style="font-family:monospace">${v.port}</td>
        <td>${v.product||v.service||'—'} <span style="color:var(--muted)">${v.version||''}</span></td>
        <td><span class="sev sev-${v.highest_severity}">${v.highest_severity}</span></td>
        <td>${v.total_cves}</td>
        <td><button class="expand-btn" onclick="toggleCve(${idx})">▶ Show CVEs</button></td>
      </tr>
      <tr><td colspan="6" style="padding:0">
        <div class="cve-list" id="cve-${idx}">${cveHtml}</div>
      </td></tr>`;
  }).join('');

  el.innerHTML = `
    <table>
      <thead><tr>
        <th>Host</th><th>Port</th><th>Service / Product</th>
        <th>Highest Severity</th><th>CVE Count</th><th>Details</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;

  document.getElementById('statCritical').textContent = critCount;
}

function toggleCve(idx) {
  const el  = document.getElementById('cve-'+idx);
  const btn = el.previousElementSibling  // the button is in prior td
              || document.querySelector(`[onclick="toggleCve(${idx})"]`);
  const open = el.classList.toggle('open');
  if (btn) btn.textContent = open ? '▼ Hide CVEs' : '▶ Show CVEs';
}

// ── API calls ──────────────────────────────────────────────────────────────
async function runScan(type) {
  if (_scanning) return;
  _scanning = true;
  setBtns(true);
  setStatus('scanning');
  toast(`Running ${type} scan…`);

  try {
    const res  = await fetch(API[type], { method:'POST' });
    const data = await res.json();

    if (!data.success) throw new Error(data.error || 'Unknown error');

    if (data.devices)         renderDevices(data.devices);
    if (data.port_scans)      renderPorts(data.port_scans);
    if (data.vulnerabilities) renderVulns(data.vulnerabilities);
    if (data.timestamp)       document.getElementById('scanTs').textContent = '@ ' + data.timestamp;

    setStatus('done');
    toast(`✅ ${type.charAt(0).toUpperCase()+type.slice(1)} scan complete!`);
  } catch(err) {
    setStatus('error');
    toast('❌ ' + err.message, true);
  } finally {
    _scanning = false;
    setBtns(false);
    // re-disable step buttons if no data
    const state = await (await fetch('/api/results')).json();
    if (!state.devices.length)    document.getElementById('btnPort').disabled = true;
    if (!state.port_scans.length) document.getElementById('btnCve').disabled  = true;
  }
}

async function exportResults() {
  window.location.href = '/api/export';
}

async function clearResults() {
  await fetch('/api/clear', { method:'POST' });
  document.getElementById('devTable').innerHTML   = '<div class="empty"><div class="icon">📡</div>Run Quick Scan or Full Scan to discover devices</div>';
  document.getElementById('portTable').innerHTML  = '<div class="empty"><div class="icon">🔒</div>Run Port Scan to see open services</div>';
  document.getElementById('vulnTable').innerHTML  = '<div class="empty"><div class="icon">✅</div>Run CVE Scan to check for known vulnerabilities</div>';
  ['statDevices','statPorts','statVulns','statCritical','devBadge','portBadge','vulnBadge'].forEach(id => {
    document.getElementById(id).textContent = '—';
  });
  document.getElementById('scanTs').textContent = '';
  ['btnPort','btnCve'].forEach(id => document.getElementById(id).disabled = true);
  setStatus('idle');
  toast('Cleared.');
}

// ── On load — restore existing results if any ──────────────────────────────
(async () => {
  try {
    const state = await (await fetch('/api/results')).json();
    if (state.devices.length)         renderDevices(state.devices);
    if (state.port_scans.length)      renderPorts(state.port_scans);
    if (state.vulnerabilities.length) renderVulns(state.vulnerabilities);
    if (state.timestamp)              document.getElementById('scanTs').textContent = '@ ' + state.timestamp;
    setStatus(state.status || 'idle');
  } catch(_) {}
})();
</script>
</body>
</html>
